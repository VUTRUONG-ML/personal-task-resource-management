services:
  postgres_db: # Tên service
    image: postgres:15-alpine
    container_name: nestjs_postgres_container # Tên container khi hiện trong Docker Desktop
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: # Khai báo volume để lưu trữ data vật lý
